<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danazian Calculator</title>
 
<style>
    body {
        background: linear-gradient(135deg, #111, #1f1f1f);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        color: white;
    }

    .calc {
        background: #2c2c2c;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h1 {
        text-align: center;
        margin-bottom: 15px;
        color: gold;
    }

    #display {
        width: 100%;
        height: 60px;
        margin-bottom: 15px;
        font-size: 2em;
        text-align: right;
        border: none;
        border-radius: 10px;
        background: #111;
        color: white;
        padding: 10px;
        box-sizing: border-box;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 70px);
        gap: 10px;
    }

    button {
        height: 70px;
        font-size: 1.4em;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #666;
        transform: scale(1.05);
    }

    .equal {
        background: orange;
    }

    .clear {
        background: crimson;
    }
</style>
</head>

<body>

<div class="calc">
    <h1>Danazian Calculator</h1>

    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('-')">−</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>

        <button onclick="append('0')" style="grid-column: span 4;">0</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {

        // BUG DANAZIEN 😭
        if (display.value.includes("18")) {

            // génère une mauvaise réponse random
            let fakeAnswer = Math.floor(Math.random() * 9999);

            display.value = fakeAnswer;

            return;
        }

        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Erreur";
        }
    }
</script>

</body>
</html>
