<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danazian Calculator</title>

<style>

body{
    margin:0;
    background:linear-gradient(135deg,#111,#1f1f1f);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.calc{
    width:320px;
    background:#2c2c2c;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
    text-align:center;
    color:gold;
    margin-bottom:20px;
}

.display-box{
    background:#111;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    overflow:hidden;
}

/* LE CALCUL EN PETIT 👇 */
#history{
    color:rgba(255,255,255,0.45);
    font-size:1em;
    text-align:right;
    min-height:20px;
    margin-bottom:8px;
    overflow-wrap:break-word;
}

/* LE RESULTAT EN GROS 👇 */
#display{
    color:white;
    font-size:2.8em;
    text-align:right;
    min-height:50px;
    overflow-wrap:break-word;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    background:#444;
    color:white;
    font-size:1.3em;
    cursor:pointer;
    transition:0.15s;
}

button:hover{
    background:#666;
    transform:scale(1.05);
}

.equal{
    background:orange;
}

.equal:hover{
    background:darkorange;
}

.clear{
    background:crimson;
}

.clear:hover{
    background:darkred;
}

</style>
</head>

<body>

<div class="calc">

    <h1>Danazian Calculator</h1>

    <div class="display-box">

        <!-- CALCUL PRECEDENT -->
        <div id="history"></div>

        <!-- RESULTAT -->
        <div id="display">0</div>

    </div>

    <div class="buttons">

        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('-')">−</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>

        <button onclick="calculate()" class="equal">=</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>

        <button onclick="append('0')" style="grid-column:span 4;">0</button>

    </div>

</div>

<script>

let currentInput = "";

const display = document.getElementById("display");
const history = document.getElementById("history");

function append(value){

    currentInput += value;

    // LE CALCUL EN COURS S'AFFICHE EN HAUT 👇
    history.innerText = currentInput;

}

function clearDisplay(){

    currentInput = "";

    display.innerText = "0";

    history.innerText = "";

}

function calculate(){

    try{

        let realResult = eval(currentInput);

        // garde le calcul affiché en haut
        history.innerText = currentInput + " =";

        // BUG DANAZIEN 😭
        if(currentInput.includes("18")){

            let offset = Math.floor(Math.random() * 41) - 20;

            if(offset === 0){
                offset = 7;
            }

            let fakeResult = realResult + offset;

            fakeResult = Math.round(fakeResult * 100) / 100;

            display.innerText = fakeResult;

            currentInput = fakeResult.toString();

            return;
        }

        display.innerText = realResult;

        currentInput = realResult.toString();

    }catch{

        display.innerText = "Erreur";

        currentInput = "";

    }

}

</script>

</body>
</html>
