<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danazian Calculator</title>

<style>
    body {
        margin: 0;
        background: linear-gradient(135deg, #111, #1f1f1f);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .calc {
        background: #2c2c2c;
        padding: 20px;
        border-radius: 20px;
        width: 320px;
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h1 {
        text-align: center;
        color: gold;
        margin-bottom: 20px;
    }

    .display-box {
        background: #111;
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 15px;
        text-align: right;
        overflow: hidden;
    }

    #history {
        color: rgba(255,255,255,0.5);
        font-size: 1em;
        min-height: 25px;
        word-wrap: break-word;
    }

    #display {
        color: white;
        font-size: 2.7em;
        min-height: 50px;
        word-wrap: break-word;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        height: 65px;
        font-size: 1.3em;
        border: none;
        border-radius: 12px;
        background: #444;
        color: white;
        cursor: pointer;
        transition: 0.15s;
    }

    button:hover {
        background: #666;
        transform: scale(1.05);
    }

    .equal {
        background: orange;
    }

    .equal:hover {
        background: darkorange;
    }

    .clear {
        background: crimson;
    }

    .clear:hover {
        background: darkred;
    }
</style>
</head>

<body>

<div class="calc">

    <h1>Danazian Calculator</h1>

    <div class="display-box">
        <div id="history"></div>
        <div id="display">0</div>
    </div>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('-')">−</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>

        <button onclick="append('0')" style="grid-column: span 4;">0</button>
    </div>

</div>

<script>

    let currentInput = "";

    const display = document.getElementById("display");
    const history = document.getElementById("history");

    function append(value) {
        currentInput += value;
        display.innerText = currentInput;
    }

    function clearDisplay() {
        currentInput = "";
        display.innerText = "0";
        history.innerText = "";
    }

    function calculate() {

        history.innerText = currentInput;

        try {

            let realResult = eval(currentInput);

            // BUG DANAZIEN 😭
            if (currentInput.includes("18")) {

                // erreur réaliste entre -20 et +20
                let offset = Math.floor(Math.random() * 41) - 20;

                // évite accidentellement le bon résultat
                if (offset === 0) {
                    offset = 7;
                }

                let fakeResult = realResult + offset;

                // arrondi propre
                fakeResult = Math.round(fakeResult * 100) / 100;

                display.innerText = fakeResult;

                currentInput = fakeResult.toString();

                return;
            }

            display.innerText = realResult;

            currentInput = realResult.toString();

        } catch {

            display.innerText = "Erreur";

            currentInput = "";

        }
    }

</script>

</body>
</html>
